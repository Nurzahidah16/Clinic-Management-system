<!DOCTYPE html>
<html>

<head>

    <title>Add Medical Record</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>
        .flash-success {
            color: #22c55e;
            margin-bottom: 10px;
        }

        .flash-error {
            color: #ef4444;
            margin-bottom: 10px;
        }
    </style>

</head>

<body>

    <div class="login-container">

        <h2>Add Medical Record</h2>

        <!-- FLASH MESSAGES -->
        {% with messages = get_flashed_messages(with_categories=true) %}
            {% if messages %}
                {% for category, message in messages %}
                    <p class="flash-{{ category }}">{{ message }}</p>
                {% endfor %}
            {% endif %}
        {% endwith %}

        <form method="POST">

            <!-- CSRF TOKEN -->
            <input type="hidden" name="csrf_token" value="{{ csrf_token }}">

            <!-- PATIENT NAME -->
            <div class="input-group">
                <label>Patient Name</label>
                <input type="text" name="patient_name" required>
            </div>

            <!-- DIAGNOSIS -->
            <div class="input-group">
                <label>Diagnosis</label>

                <select name="diagnosis_select"
                        id="diagnosis_select"
                        onchange="toggleDiagnosis()" required>

                    <option value="">Select Diagnosis</option>
                    <option value="Fever">Fever</option>
                    <option value="Hypertension">Hypertension</option>
                    <option value="Diabetes">Diabetes</option>
                    <option value="Migraine">Migraine</option>
                    <option value="Asthma">Asthma</option>
                    <option value="Flu">Flu</option>
                    <option value="Allergy">Allergy</option>
                    <option value="Other">Other</option>

                </select>
            </div>

            <!-- OTHER DIAGNOSIS -->
            <div class="input-group" id="diagnosis_other_box" style="display:none;">
                <label>Other Diagnosis</label>
                <input type="text" name="diagnosis_other">
            </div>

            <!-- PRESCRIPTION -->
            <div class="input-group">
                <label>Prescription</label>

                <select name="prescription_select"
                        id="prescription_select"
                        onchange="togglePrescription()" required>

                    <option value="">Select Prescription</option>
                    <option value="Paracetamol">Paracetamol</option>
                    <option value="Amoxicillin">Amoxicillin</option>
                    <option value="Ibuprofen">Ibuprofen</option>
                    <option value="Antihistamine">Antihistamine</option>
                    <option value="Cough Syrup">Cough Syrup</option>
                    <option value="Insulin">Insulin</option>
                    <option value="Vitamin C">Vitamin C</option>
                    <option value="Other">Other</option>

                </select>
            </div>

            <!-- OTHER PRESCRIPTION -->
            <div class="input-group" id="prescription_other_box" style="display:none;">
                <label>Other Prescription</label>
                <input type="text" name="prescription_other">
            </div>

            <!-- NOTES -->
            <div class="input-group">
                <label>Doctor Notes (Optional)</label>

                <textarea name="notes"
                          rows="4"
                          style="width:100%; padding:12px; border-radius:10px;">
                </textarea>
            </div>

            <button type="submit" class="login-btn">
                Save Medical Record
            </button>

        </form>

    </div>

    <!-- JS FOR OTHER FIELDS -->
    <script>
        function toggleDiagnosis() {
            var val = document.getElementById("diagnosis_select").value;
            document.getElementById("diagnosis_other_box").style.display =
                (val === "Other") ? "block" : "none";
        }

        function togglePrescription() {
            var val = document.getElementById("prescription_select").value;
            document.getElementById("prescription_other_box").style.display =
                (val === "Other") ? "block" : "none";
        }
    </script>

</body>

</html>
