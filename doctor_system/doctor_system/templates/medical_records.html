<!DOCTYPE html>
<html>

<head>

    <title>Medical Records</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

</head>

<body>

    <div class="dashboard-container">

        <div class="top-bar">

            <h1 class="dashboard-title">
                Medical Records
            </h1>

            <a href="/add_medical_record"
               class="add-btn">

                + Add Record

            </a>

        </div>

        <table class="appointment-table">

            <tr>

                <th>ID</th>
                <th>Patient</th>
                <th>Diagnosis</th>
                <th>Prescription</th>
                <th>Last Updated</th>
                <th>Notes</th>

            </tr>

            {% for record in records %}

            <tr>

                <td>{{ record.record_id }}</td>

                <td>{{ record.patient_name }}</td>

                <td>{{ record.diagnosis }}</td>

                <td>{{ record.prescription }}</td>

                <td>{{ record.created_at }}</td>

                <td>{{ record.notes }}</td>

            </tr>

            {% endfor %}

        </table>

        <br>

        <a href="/dashboard"
           class="logout-btn">

            Back to Dashboard

        </a>

    </div>

</body>

</html>
