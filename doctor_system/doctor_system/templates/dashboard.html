<!DOCTYPE html>
<html>

<head>

    <title>Doctor Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <!-- ICON LIBRARY -->
    <link rel="stylesheet"
          href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">

    <style>

        /* KEEP YOUR ORIGINAL STYLE */
        .dashboard-container {
            padding: 30px;
            position: relative;
            z-index: 2;
        }

        .dashboard-title {
            margin-bottom: 20px;
        }

        .card-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 20px;
        }

        .dashboard-card {
            background: rgba(255, 255, 255, 0.08);
            backdrop-filter: blur(12px);
            padding: 20px;
            border-radius: 15px;
            transition: 0.3s;
            cursor: pointer;
            min-height: 120px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            position: relative;
            overflow: hidden;
        }

        .dashboard-card:hover {
            transform: translateY(-6px);
            background: rgba(255, 255, 255, 0.12);
        }

        .dashboard-card h3 {
            margin: 0;
            margin-bottom: 8px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .dashboard-card p {
            margin: 0;
            opacity: 0.7;
            font-size: 14px;
        }

        .analytics-card {
            grid-column: span 2;
        }

        @media (max-width: 768px) {
            .analytics-card {
                grid-column: span 1;
            }
        }

        .logout-btn {
            display: inline-block;
            margin-top: 30px;
            padding: 10px 18px;
            border-radius: 10px;
            background: #ef4444;
            color: white;
            text-decoration: none;
        }

        .logout-btn:hover {
            background: #dc2626;
        }

        /* ICON STYLE */
        .card-icon {
            font-size: 18px;
            opacity: 0.9;
        }

        /* BACKGROUND ANIMATION (SUBTLE FLOATING BLOBS) */
        body::before,
        body::after {
            content: "";
            position: fixed;
            width: 300px;
            height: 300px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 50%;
            z-index: 0;
            filter: blur(40px);
            animation: float 12s infinite ease-in-out;
        }

        body::before {
            top: 10%;
            left: 10%;
        }

        body::after {
            bottom: 10%;
            right: 10%;
            animation-delay: 6s;
        }

        @keyframes float {
            0% { transform: translateY(0px) scale(1); }
            50% { transform: translateY(-20px) scale(1.1); }
            100% { transform: translateY(0px) scale(1); }
        }

    </style>

</head>

<body>

    <div class="dashboard-container">

        <h1 class="dashboard-title">
            Welcome Dr. {{ doctor_name }}
        </h1>

        <div class="card-grid">

            <a href="/appointments" style="text-decoration:none; color:inherit;">
                <div class="dashboard-card">
                    <h3><i class="fa-solid fa-calendar-check card-icon"></i> Appointments</h3>
                    <p>View and manage appointments.</p>
                </div>
            </a>

            <a href="/medical_records" style="text-decoration:none; color:inherit;">
                <div class="dashboard-card">
                    <h3><i class="fa-solid fa-notes-medical card-icon"></i> Medical Records</h3>
                    <p>Update patient records.</p>
                </div>
            </a>

            <a href="/search_patient" style="text-decoration:none; color:inherit;">
                <div class="dashboard-card">
                    <h3><i class="fa-solid fa-magnifying-glass card-icon"></i> Patient Search</h3>
                    <p>Search patient information.</p>
                </div>
            </a>

            <a href="/audit_logs" style="text-decoration:none; color:inherit;">
                <div class="dashboard-card">
                    <h3><i class="fa-solid fa-shield-halved card-icon"></i> Audit Logs</h3>
                    <p>Monitor system activity securely.</p>
                </div>
            </a>

            <a href="/analytics"
               style="text-decoration:none; color:inherit;"
               class="analytics-card">

                <div class="dashboard-card">
                    <h3><i class="fa-solid fa-chart-line card-icon"></i> Dashboard Analytics</h3>
                    <p>View clinic performance overview.</p>
                </div>

            </a>

        </div>

        <a href="/logout" class="logout-btn">
            Logout
        </a>

    </div>

</body>

</html>
