<!DOCTYPE html>
<html>

<head>

    <title>Analytics Dashboard</title>

    <link rel="stylesheet"
          href="{{ url_for('static', filename='style.css') }}">

    <style>

        .analytics-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
            gap: 20px;
            margin-top: 25px;
        }

        .card {
            background: rgba(217, 255, 0, 0.08);
            padding: 25px;
            border-radius: 15px;
            backdrop-filter: blur(10px);
            color: rgb(41, 41, 0);
            text-align: center;
            transition: 0.3s;
        }

        .card:hover {
            transform: translateY(-5px);
            background: rgba(255,255,255,0.12);
        }

        .card h3 {
            margin-bottom: 10px;
            font-size: 18px;
        }

        .card p {
            font-size: 24px;
            font-weight: bold;
            margin: 0;
        }

    </style>

</head>

<body>

<div class="dashboard-container">

    <h1 class="dashboard-title">Clinic Analytics Dashboard</h1>

    <!-- CARDS ONLY -->
    <div class="analytics-grid">

        <div class="card">
            <h3>Total Appointments</h3>
            <p>{{ total_appointments }}</p>
        </div>

        <div class="card">
            <h3>Total Medical Records</h3>
            <p>{{ total_records }}</p>
        </div>

        <div class="card">
            <h3>Today's Appointments</h3>
            <p>{{ today_appointments }}</p>
        </div>

        <div class="card">
            <h3>Total Patients</h3>
            <p>{{ total_patients }}</p>
        </div>

    </div>

    <br>

    <a href="/dashboard" class="logout-btn">Back to Dashboard</a>

</div>

</body>

</html>
