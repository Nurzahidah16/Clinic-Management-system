{% extends "base.html" %}
{% block content %}

<div class="dashboard-container">
    <div class="top-bar">
        <div>
            <h1 class="dashboard-title">Dashboard</h1>
            <p style="color: #705335; font-size: 15px; margin-top: 4px;">
                Welcome back, <strong style="color: #4a3321;">{{ session['full_name'] }}</strong>.
            </p>
        </div>
        <a href="{{ url_for('logout') }}" class="logout-btn">Logout</a>
    </div>

    <div class="card-grid">
        
        <a href="{{ url_for('book_appointment') }}" style="text-decoration: none;">
            <div class="dashboard-card">
                <span style="font-size: 28px; display: block; margin-bottom: 10px;">📅</span>
                <h3>Book Appointment</h3>
                <p style="color: #8a735d; font-size: 13px; margin-top: 5px;">Schedule a new session with us quickly.</p>
            </div>
        </a>

        <a href="{{ url_for('my_appointments') }}" style="text-decoration: none;">
            <div class="dashboard-card">
                <span style="font-size: 28px; display: block; margin-bottom: 10px;">📋</span>
                <h3>My Appointments</h3>
                <p style="color: #8a735d; font-size: 13px; margin-top: 5px;">View, manage, or change your existing bookings.</p>
            </div>
        </a>

    </div>
</div>

{% endblock %}
